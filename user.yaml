- name: setup user server
  hosts: user
  become: yes
  tasks:
  - name: disable default nodejs
    ansible.builtin.command: dnf module disable nodejs -y

  - name: enable nodejs 20
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: present
  
  - name: create roboshop system user
    ansible.builtin.user:
      name: roboshop
      comment: roboshop system user
      system: true
      shell: /sbin/nologin

  - name: delete existing app directory
    ansible.builtin.file:
      state: absent
      path: /app

  - name: create app directory
    ansible.builtin.file:
      state: directory
      path: /app

  - name: delete existing user application
    ansible.builtin.file:
      state: absent
      path: /tmp/user.zip
  
  - name: download user application
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip 
      dest: /tmp/user.zip

  - name: unzip user application
    ansible.builtin.unarchive:
      src: /tmp/user.zip
      dest: /app
      remote_src: yes

  - name: Install packages based on package.json
    community.general.npm:
      path: /app

  - name: copy user service
    ansible.builtin.copy:
      src: user.service
      dest: /etc/systemd/system/user.service

  - name: start, enable and demon reload user 
    ansible.builtin.systemd_service:
      name: user 
      state: started
      enabled: yes
      daemon_reload: true

  - name: restart user service
    ansible.builtin.systemd_service:
      name: user
      state: restarted