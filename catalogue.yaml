- name: setup catalogue server
  hosts: catalogue
  become: yes
  tasks:
  - name: disable default nodejs
    ansible.builtin.command: dnf module disable nodejs -y

  - name: enable nodejs 20
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: present
  
  - name: create roboshop system user
    ansible.builtin.user:
      name: roboshop
      comment: roboshop system user
      system: true
      shell: /sbin/nologin

  - name: create app directory
    ansible.builtin.file:
      state: directory
      path: /app
  
  - name: download catalogue application
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip 
      dest: /tmp/catalogue.zip

  - name: unzip catalogue application
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes

  - name: Install packages based on package.json
    community.general.npm:
      path: /app

  - name: copy catalogue service
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: start, enable catalogue
    ansible.builtin.service:
      name: catalogue 
      state: started
      enabled: yes

  - name: copy mongo repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: install mongodb client
    ansible.builtin.dnf:
      name: mongodb-mongosh
      state: present

  - name: Check if catalogue database exists
    ansible.builtin.command: mongosh mongodb.heman.icu --quiet --eval "db.getMongo().getDBNames().includes('catalogue')"
    register: catalogue_output

  - name: catalogue output
    ansible.builtin.debug:
      msg: "{{ catalogue_output }}"

  - name: load products into mongodb
    ansible.builtin.shell: mongosh --host mongodb.heman.icu </app/db/master-data.js
    when: catalogue_output.stdout == "false"

  - name: restart catalogue service
    ansible.builtin.service:
      name: catalogue
      state: restarted